      <header>
        <h1>TORQ — Fotbalové turnaje a zápasy pro amatérské trenéry</h1>
        <p>
          Webová aplikace pro vytvoření fotbalového turnaje za minutu, živé
          skórování zápasů přes telefon a sdílení výsledků rodičům přes QR kód
          a krátký odkaz. Pro amatérské trenéry mládeže, učitele tělocviku
          a organizátory školních a obecních turnajů v České republice.
        </p>
      </header>

      <section>
        <h2>Klíčové funkce</h2>
        <ul>
          <li><strong>Turnajový wizard</strong> — vytvoří turnaj za 1 minutu pro 2–32 týmů s automatickým rozlosováním (round-robin, skupiny + KO, čistý KO)</li>
          <li><strong>Živé skóre</strong> — 1-tap záznam gólů, karet (žluté/červené), střídání během zápasu</li>
          <li><strong>Sdílení s rodiči</strong> — QR kód + odkaz pro veřejné live sledování bez registrace</li>
          <li><strong>Klubový roster</strong> — správa hráčů, věkové kategorie U6–U19, sdílení s asistenty trenéra</li>
          <li><strong>FAČR-friendly</strong> — PDF export pro hlášení Fotbalové asociace ČR</li>
          <li><strong>Offline mode</strong> — PWA funguje bez internetu, synchronizace při návratu online</li>
          <li><strong>Více jazyků</strong> — čeština, angličtina, němčina</li>
        </ul>
      </section>

      <section>
        <h2>Pro koho je TORQ</h2>
        <ul>
          <li>Amatérští trenéři fotbalové mládeže (kategorie U6 až U19)</li>
          <li>Učitelé tělocviku organizující školní turnaje (např. McDonald's Cup)</li>
          <li>Vedoucí letních táborů a sportovních kroužků</li>
          <li>Organizátoři obecních a firemních turnajů</li>
        </ul>
      </section>

      <section>
        <h2>Formáty zápasů</h2>
        <p>
          TORQ podporuje typické formáty české amatérské ligy: 3+1 (mini),
          4+1 (florbal default), 5+1 (mládež malé hřiště), 7+1 (přípravka /
          starší žáci), 8+1 (žáci), 11+1 (velké hřiště). Délka zápasu
          a počet poločasů lze nastavit.
        </p>
      </section>

      <section>
        <h2>Cena</h2>
        <p>
          Free plan zdarma: 1 turnaj, 10 zápasů, 5 tréninků. Sdílení s rodiči
          vždy zdarma. Premium plán pro neomezené použití je v plánování.
        </p>
      </section>

      <section>
        <h2>Technologie</h2>
        <p>
          TORQ je Progressive Web Application (PWA) postavená na React,
          TypeScript, Firebase Realtime Database. Hostováno v Belgii
          (Firebase europe-west1). Pro mobilní zařízení doporučujeme
          „Přidat na plochu" z prohlížeče Chrome nebo Safari.
        </p>
      </section>
