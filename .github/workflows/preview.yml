name: Preview & Build Test

# Spustí se při otevření/aktualizaci Pull Requestu
on:
  pull_request:
    branches:
      - main

jobs:
  build-and-preview:
    name: 🔍 Build Test & Preview
    runs-on: ubuntu-latest

    # Oprávnění pro komentáře k PR
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      # Build test — ověří že se kód zkompiluje bez chyb
      - name: Build frontend
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY:              ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN:          ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_DATABASE_URL:         ${{ secrets.VITE_FIREBASE_DATABASE_URL }}
          VITE_FIREBASE_PROJECT_ID:           ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET:       ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID:  ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID:               ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MEASUREMENT_ID:       ${{ secrets.VITE_FIREBASE_MEASUREMENT_ID }}
          VITE_DEV_AUTH_BYPASS: 'false'

      - name: Install functions dependencies
        run: npm ci
        working-directory: functions

      - name: Build functions
        run: npm run build
        working-directory: functions

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      # Preview deploy — dočasná URL pro testování (vyprší po 7 dnech)
      - name: Deploy Preview
        id: preview
        run: |
          CHANNEL_ID="pr-${{ github.event.pull_request.number }}"
          OUTPUT=$(npx firebase-tools hosting:channel:deploy "$CHANNEL_ID" \
            --project tourniquet-7a123 \
            --expires 7d \
            --json 2>&1)
          echo "$OUTPUT"
          PREVIEW_URL=$(echo "$OUTPUT" | python3 -c "
          import sys, json
          for line in sys.stdin:
              try:
                  data = json.loads(line)
                  if 'result' in data:
                      for key, val in data['result'].items():
                          print(val.get('url', ''))
                          break
              except: pass
          ")
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT

      # Komentář s preview URL přímo do PR
      - name: Comment Preview URL
        if: steps.preview.outputs.preview_url != ''
        uses: actions/github-script@v7
        with:
          script: |
            const url = '${{ steps.preview.outputs.preview_url }}';
            const body = `## 🔍 Preview ready!\n\n**URL:** ${url}\n\nTato preview vyprší za 7 dní. Otestuj změny před merge do main.`;

            // Najdi existující komentář od bota
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' && c.body.includes('Preview ready')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
